[pytest]
# Pytest configuration for ingest_core

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 3.11

# CLI options to always use
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --cov=ingest_core
    --cov-report=html
    --cov-report=term-missing

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database, storage, etc.)
    slow: Slow-running tests
    requires_api_key: Tests requiring external API keys
    requires_db: Tests requiring database connection
    requires_gpu: Tests requiring GPU/CUDA

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration
[coverage:run]
source = ingest_core
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
